# 网站信息
title: 阿呆和他的朋友们
subtitle: 技术分享与个人随想
description: 阿呆和他的朋友们的技术博客，分享AI技术、编程经验、个人随想
keywords: AI,技术,编程,生活,随想
author: 阿呆
language: zh-CN
timezone: Asia/Shanghai

# URL配置
url: http://34.50.39.189
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# 目录
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# 写作
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ""

# 分类和标签
default_category: uncategorized
category_map:
tag_map:

# 元数据元素
meta_generator: true

# 日期格式
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# 分页
per_page: 10
pagination_dir: page

# 扩展
theme: Butterfly

# 部署配置
deploy:
  type: ""

# Markdown配置
markdown:
  preset: default
  render:
    html: true
    xhtmlOut: false
    breaks: true
    linkify: true
    typographer: true
  enable_rules:
  disable_rules:
